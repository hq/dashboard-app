// Helpers for safe DOM creation
function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'class') e.className = v;
    else if (k === 'style') e.style.cssText = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  });
  if (children) {
    if (typeof children === 'string') e.textContent = children;
    else if (Array.isArray(children)) children.forEach(c => { if (c) e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
    else e.appendChild(children);
  }
  return e;
}

function buildStats(items) {

      el('div', {class:'label'}, i.l),

  });
  return grid;
}

function buildIntTabs() {
  const tabs = el('div', {class:'tabs'});
  [['all','All (18)'],['confirmed','Confirmed (8)'],['missing','Not Found (6)'],['partial','Partial (2)'],['new','New (2)']].forEach(([key,label], i) => {
    const t = el('div', {class:'tab' + (i===0?' active':''), onclick: (e) => {
      tabs.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      e.target.classList.add('active');
      renderIntGrid(key);
    }}, label);
    tabs.appendChild(t);
  });
  return tabs;
}

function renderIntGrid(filter) {
  const grid = document.getElementById('int-grid');
  if (!grid) return;
  while (grid.firstChild) grid.removeChild(grid.firstChild);
  const items = filter === 'all' ? integrations : integrations.filter(i => i.status === filter);
  const sc = {confirmed:'green', missing:'red', partial:'yellow', 'new':'blue'};
  const cc = {Critical:'red', High:'orange', 'Medium-High':'orange', Medium:'yellow', Low:'blue', Unknown:'purple'};
  items.forEach(i => {
    const card = el('div', {class:'int-card'}, [
      el('div', {class:'int-name'}, [document.createTextNode(i.name), badge(i.status, sc[i.status]||'blue')]),
      el('div', {class:'int-desc'}, i.desc),
      el('div', {class:'int-meta'}, [badge(i.crit, cc[i.crit]||'purple'), badge(i.type, 'blue'), badge(i.scope, 'purple')]),
    ]);
    grid.appendChild(card);
  });
}

function buildFlowCard(f) {
  const card = el('div', {class:'flow-card'}, [
    el('div', {class:'flow-card-title'}, f.id + '. ' + f.title),
    el('div', {class:'flow-card-desc'}, f.desc),
    el('div', {class:'flow-detail'}, [
      (() => {
        const sec = el('div', {class:'flow-detail-section'});
        sec.appendChild(el('div', {class:'flow-detail-label'}, 'Third-Party Handoffs'));
        f.handoffs.forEach(h => sec.appendChild(el('div', {class:'flow-detail-item'}, '\u2192 ' + h)));
        return sec;
      })(),
      (() => {
        const sec = el('div', {class:'flow-detail-section'});
        sec.appendChild(el('div', {class:'flow-detail-label'}, 'Friction Points'));
        f.friction.forEach(fr => sec.appendChild(el('div', {class:'flow-detail-item warning'}, '\u26A0 ' + fr)));

function buildQuestionStats() {
  let open = 0, answered = 0;
  questionCategories.forEach(c => c.questions.forEach(q => { if(q.s==='answered') answered++; else open++; }));
  return buildStats([{v:String(open),l:'Open',c:'yellow'},{v:String(answered),l:'Answered',c:'green'},{v:String(open+answered),l:'Total',c:'blue'}]);
}

function buildQuestionCategory(cat) {
  const div = el('div', {class:'q-category'});
  const open = cat.questions.filter(q => q.s === 'open').length;
  const header = el('div', {class:'q-category-header'}, [
    el('span', null, cat.name),
    el('span', {class:'q-category-count'}, open + ' open / ' + cat.questions.length + ' total'),
  ]);
  div.appendChild(header);
  cat.questions.forEach(q => {
    const check = el('div', {class:'q-check' + (q.s==='answered'?' checked':'')}, q.s==='answered' ? '\u2713' : '');
    check.addEventListener('click', () => {
      check.classList.toggle('checked');
      check.textContent = check.classList.contains('checked') ? '\u2713' : '';
    });
    const textDiv = el('div', {class:'q-text'}, q.t);
    if (q.n) textDiv.appendChild(el('span', {class:'q-note'}, '\u2713 ' + q.n));
    div.appendChild(el('div', {class:'q-item'}, [check, textDiv]));
  });
  return div;
}
